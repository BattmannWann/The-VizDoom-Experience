name: ViZDoom CI

# Trigger the workflow on every push or pull request to the main branch
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull the code from repo
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Set up a Python environment
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Install ViZDoom's Linux System Dependencies
    - name: Install ViZDoom System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential zlib1g-dev libsdl2-dev libjpeg-dev \
        nasm tar libbz2-dev libgtk2.0-dev cmake git libfluidsynth-dev libgme-dev \
        libopenal-dev timidity libwildmidi-dev unzip

    # 4. Install Python libraries
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 5. Run Pytest with Coverage
    - name: Run Tests and Generate Coverage
      run: |
        python -m pytest